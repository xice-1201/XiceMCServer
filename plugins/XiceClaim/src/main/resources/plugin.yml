name: XiceClaim
version: 0.0.1
main: com.xice.xicemc.claim.XiceClaimPlugin
api-version: '1.21'
author: Xice
description: Lightweight claim protection for XiceMCServer.
commands:
  claim:
    description: Manage land claims.
    usage: /claim <help|pos1|pos2|create|info|list|trust|untrust|delete|reload>
    aliases: [xiceclaim]
permissions:
  xiceclaim.admin:
    description: Bypass and manage all claims.
    default: op
