name: XiceClaim
version: 0.0.2
main: com.xice.xicemc.claim.XiceClaimPlugin
api-version: '1.21'
author: Xice
description: Lightweight claim protection for XiceMCServer.
commands:
  claim:
    description: Manage land claims.
    usage: /claim <help|pos1 [X Y Z]|pos2 [X Y Z]|create|info [name]|list [player]|trust|untrust|delete|reload>
    aliases: [xiceclaim]
permissions:
  xiceclaim.admin:
    description: Bypass and manage all claims.
    default: op
