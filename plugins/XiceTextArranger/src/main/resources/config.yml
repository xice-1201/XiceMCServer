# 白名单拒绝提示。
# 玩家尚未进入服务器时会看到该消息。
whitelist-denied:
  enabled: true
  message:
    - '&c你暂未加入 XiceMCServer 白名单。'
    - '&f服务器版本：&eMinecraft Java 版 1.21.11'
    - '&f你的临时邀请码：&e{verificationCode}'
    - '&7邀请码将在 {verificationExpiresMinutes} 分钟后失效。'
    - '&f请使用浏览器打开 Web 首页：'
    - '&bhttps://xicemc.site/'
    - '&7在页面右上角点击“测试入口”，填写玩家ID和邀请码。'
    - '&7提交成功后，回到游戏重新连接服务器。'

# 白名单临时邀请码。
# 玩家被白名单拒绝时生成，Web 登记成功后会立刻失效。
verification-codes:
  enabled: true
  path: plugins/XiceTextArranger/verification-codes.tsv
  ttl-seconds: 300
  length: 6
  alphabet: '23456789ABCDEFGHJKLMNPQRSTUVWXYZ'

# 服务器黑名单。
# Web 举报受理选择封禁后会写入该文件；插件会在玩家登录时拦截。
blacklist:
  enabled: true
  path: plugins/XiceTextArranger/blacklist.tsv
  message:
    - '&c你已被加入 XiceMCServer 黑名单。'
    - '&f原因：&e{reason}'
    - '&f到期时间：&e{expiresAt}'

# 正版验证失败提示。
# 仅当服务端可捕获到认证失败拒绝消息，并且原始拒绝消息匹配 match-messages 时生效。
auth-denied:
  enabled: true
  match-messages:
    - 'failed to verify username'
    - 'failed to authenticate your connection'
    - 'invalid session'
  message:
    - '&c你的登录未通过 Minecraft 正版验证。'
    - '&f请使用正版启动器登录 Microsoft 账号后重新进入。'
    - '&7如果你刚刚登录过账号，请重启启动器后再试。'

# 玩家加入消息。
# mode 可选：keep、delete、rewrite、add。
join:
  mode: keep
  message: '&7{player} 加入了服务器。'

# 玩家退出消息。
# mode 可选：keep、delete、rewrite、add。
quit:
  mode: keep
  message: '&7{player} 离开了服务器。'

# 系统广播消息。
# 可由控制台或 RCON 执行：xicebroadcast restart-warning time=10分钟
broadcasts:
  restart-warning:
    enabled: true
    message:
      - '&6[系统] &f服务器将在 &e{time} &f后进行每日备份与更新。'
      - '&7请尽快移动到安全位置，并停止重要操作。'
