server {
    listen 80;
    listen [::]:80;
    server_name xicemc.site www.xicemc.site;

    # Temporary allowlist while ICP filing is under review.
    # Keep the domain entry ready, but expose the Web portal only to the owner IP.
    location / {
        allow 203.0.113.10;
        allow 203.0.113.11;
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 150.158.93.80 _;

